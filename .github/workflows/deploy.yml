name: Deploy Blog to Vultr

on:
  release:
    types: [published]  # Auto-deploy on release
  workflow_dispatch: # Manual trigger from GitHub UI

env:
  NODE_VERSION: '20'
  APP_NAME: 'blog'
  APP_DIR: '/var/www/sewwa.com/html'
  RELEASES_DIR: '/var/www/sewwa.com/html/releases'
  LOGS_DIR: '/var/www/sewwa.com/html/logs'

jobs:
  build:
    name: 🔍 Lint & build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🎭 Install Playwright Chromium (Mermaid diagrams in MDX)
        run: npx playwright install --with-deps chromium

      - name: 🏗️ Build Astro
        run: npm run build
        env:
          NODE_ENV: production

      - name: 📦 Create deployment archive
        run: |
          # List files to verify
          echo "📂 Files to archive:"
          ls -la dist/
          
          # Create archive with dist folder
          tar -czf deploy.tar.gz dist/
          
          # Display archive info
          echo "📦 Archive created:"
          ls -lh deploy.tar.gz
          echo "📋 Archive contents:"
          tar -tzf deploy.tar.gz | head -20

      - name: 💾 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-archive
          path: deploy.tar.gz
          retention-days: 7

  deploy:
    name: 🚀 Deploy to Vultr
    runs-on: ubuntu-latest
    needs: build
    environment: production
    
    steps:
      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-archive

      - name: 🔑 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: 📤 Upload to Vultr
        run: |
          scp -i ~/.ssh/deploy_key \
            -P ${{ secrets.SSH_PORT || '22' }} \
            deploy.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/deploy_blog_${{ github.run_number }}.tar.gz

      - name: 🚀 Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.SSH_PORT || '22' }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e
            
            # Variables
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            RELEASE_DIR="${{ env.RELEASES_DIR }}/$TIMESTAMP"
            APP_DIR="${{ env.APP_DIR }}"
            ARCHIVE="/tmp/deploy_blog_${{ github.run_number }}.tar.gz"
            
            echo "📦 Deploying to: $RELEASE_DIR"
            
            # Create release directory (clean if exists)
            if [ -d "$RELEASE_DIR" ]; then
              rm -rf "$RELEASE_DIR"
            fi
            mkdir -p $RELEASE_DIR
            
            # Extract archive to temporary location
            TEMP_EXTRACT_DIR=$(mktemp -d)
            echo "📂 Extracting archive..."
            tar -xzf $ARCHIVE -C $TEMP_EXTRACT_DIR
            
            # Verify extraction was successful
            if [ ! -d "$TEMP_EXTRACT_DIR/dist" ]; then
              echo "❌ Error: Archive extraction failed - dist directory not found"
              rm -rf $TEMP_EXTRACT_DIR
              exit 1
            fi
            
            # Move all files from dist/ to release directory
            echo "📦 Moving files to release directory..."
            mv $TEMP_EXTRACT_DIR/dist/* $RELEASE_DIR/
            rm -rf $TEMP_EXTRACT_DIR
            
            # Create directories
            mkdir -p ${{ env.RELEASES_DIR }}
            mkdir -p ${{ env.LOGS_DIR }}
            mkdir -p $APP_DIR
            
            # Backup current release (if exists)
            if [ -L "$APP_DIR/current" ]; then
              CURRENT_RELEASE=$(readlink -f $APP_DIR/current)
              if [ -d "$CURRENT_RELEASE" ]; then
                BACKUP_DIR="$APP_DIR/backup_$(date +%Y%m%d_%H%M%S)"
                echo "💾 Backing up current release to: $BACKUP_DIR"
                mkdir -p $BACKUP_DIR
                cp -al $CURRENT_RELEASE/* $BACKUP_DIR/ 2>/dev/null || true
              fi
            fi
            
            # Verify release directory has files
            if [ ! "$(ls -A $RELEASE_DIR)" ]; then
              echo "❌ Error: Release directory is empty"
              exit 1
            fi
            
            # Set proper permissions BEFORE creating symlink
            echo "🔐 Setting permissions..."
            chown -R www-data:www-data "$RELEASE_DIR" 2>/dev/null || true
            chmod -R 755 "$RELEASE_DIR"
            
            # Update symlink (atomic operation for zero downtime)
            echo "🔗 Updating symlink..."
            ln -sfn $RELEASE_DIR $APP_DIR/current || {
              echo "❌ Failed to update symlink"
              exit 1
            }
            
            # Cleanup
            echo "🧹 Cleaning up..."
            rm -f $ARCHIVE || {
              echo "⚠️  Failed to remove archive, but continuing..."
            }
            
            # Keep only last 2 releases (disable error handling for cleanup)
            set +e
            if [ -d "${{ env.RELEASES_DIR }}" ]; then
              cd "${{ env.RELEASES_DIR }}" 2>/dev/null
              OLD_RELEASES=$(ls -t 2>/dev/null | tail -n +3 2>/dev/null)
              if [ -n "$OLD_RELEASES" ]; then
                echo "$OLD_RELEASES" | while read -r dir; do
                  if [ -n "$dir" ] && [ -d "$dir" ]; then
                    rm -rf "$dir" 2>/dev/null || true
                  fi
                done
                echo "✅ Kept last 2 releases"
              else
                echo "ℹ️  No old releases to clean up"
              fi
            fi

            # Keep only last 2 backups
            if [ -d "$APP_DIR" ]; then
              cd "$APP_DIR" 2>/dev/null
              OLD_BACKUPS=$(ls -dt backup_* 2>/dev/null | tail -n +3 2>/dev/null)
              if [ -n "$OLD_BACKUPS" ]; then
                echo "$OLD_BACKUPS" | while read -r dir; do
                  if [ -n "$dir" ] && [ -d "$dir" ]; then
                    rm -rf "$dir" 2>/dev/null || true
                  fi
                done
                echo "✅ Kept last 2 backups"
              else
                echo "ℹ️  No old backups to clean up"
              fi
            fi
            set -e
            
            echo "🎉 Deployment completed successfully!"
            echo "📍 Release: $RELEASE_DIR"
            echo "📍 Symlink: $APP_DIR/current -> $RELEASE_DIR"
          ENDSSH

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -f deploy.tar.gz

  verify:
    name: ✅ Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    
    steps:
      - name: 🔑 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: ✅ Check deployment
        run: |
          echo "⏳ Waiting for deployment to complete..."
          sleep 5
          
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.SSH_PORT || '22' }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'ls -la ${{ env.APP_DIR }}/current && echo "✅ Deployment symlink exists"'

      - name: 🏥 Health check
        run: |
          echo "🔍 Performing health check..."
          sleep 5
          
          # Try to curl the endpoint
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://www.sewwa.com/ || echo "000")
          
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "301" ] || [ "$RESPONSE" = "302" ]; then
            echo "✅ Health check passed! (Status: $RESPONSE)"
          else
            echo "⚠️  Health check returned status: $RESPONSE"
            echo "Note: This might be normal if the site is still deploying or DNS not configured yet"
          fi

      - name: 🧹 Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key

  summary:
    name: 📊 Deployment Summary
    runs-on: ubuntu-latest
    needs: [build, deploy, verify]
    if: always()
    
    steps:
      - name: 📊 Generate summary
        run: |
          echo "## 🎉 Blog Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production (Vultr VPS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "- Lint & build: \`${{ needs.build.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy: \`${{ needs.deploy.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Verify: \`${{ needs.verify.result }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://www.sewwa.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Quick Commands" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Check deployment directory" >> $GITHUB_STEP_SUMMARY
          echo "ssh user@server 'ls -la /var/www/sewwa.com/html'" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# View releases" >> $GITHUB_STEP_SUMMARY
          echo "ssh user@server 'ls -lt /var/www/sewwa.com/html/releases'" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Rollback to previous release (example)" >> $GITHUB_STEP_SUMMARY
          echo "ssh user@server 'cd /var/www/sewwa.com/html/releases && ls -dt */ | head -2'" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
