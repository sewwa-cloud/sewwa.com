name: Auto Bump Version on Release

on:
  release:
    types: [published]

jobs:
  bump-version:
    name: 📦 Sync package.json Version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Extract version from tag
        id: version
        run: |
          # Strip 'v' prefix from tag (e.g., v0.4.15 → 0.4.15)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current tag: $GITHUB_REF_NAME"
          echo "Package version: $VERSION"

      - name: 🔄 Update package.json
        run: |
          # Use node to update version reliably
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Updated package.json to version ${{ steps.version.outputs.version }}"
          cat package.json | grep version

      - name: 💾 Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}" || echo "No changes needed"
          git push origin main
