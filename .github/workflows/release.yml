name: Auto Bump Version on Release

on:
  release:
    types: [published]

jobs:
  bump-version:
    name: 📦 Sync package.json Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 📥 Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $GITHUB_REF_NAME → $VERSION"

      - name: 🔄 Sync package.json version
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version
          echo "Updated to ${{ steps.version.outputs.version }}:"
          grep '"version"' package.json

      - name: 🌿 Create PR branch & push
        run: |
          BRANCH="chore/bump-version-${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json
          if git diff --staged --quiet; then
            echo "No version change needed"
            echo "skip=true" >> "$GITHUB_ENV"
          else
            git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
            git push origin "$BRANCH"
            echo "branch=$BRANCH" >> "$GITHUB_ENV"
            echo "pr_url=$(gh pr view --json url -q .url 2>/dev/null || echo '')" >> "$GITHUB_ENV"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Create Pull Request
        if: env.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: bump version to ${{ steps.version.outputs.version }}" \
            --body "Automated version bump from release \`$GITHUB_REF_NAME\`." \
            --base main \
            --head "$BRANCH" \
            --label "skip-changelog"

      - name: ✅ Enable auto-merge
        if: env.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 5
          gh pr merge "$BRANCH" --auto --squash
